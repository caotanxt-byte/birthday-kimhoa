<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Kim Hoa</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* tiêu đề */

h1{
margin-top:40px;
font-size:28px;
}

/* sao */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* bong bóng */

.balloon{
position:absolute;
width:40px;
height:50px;
border-radius:50%;
opacity:.8;
animation:float 12s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-100vh)}
}

/* chữ */

.message{
margin-top:40px;
font-size:22px;
line-height:40px;
}

.line{
opacity:0;
transition:1s;
}

.show{
opacity:1;
}

/* bánh */

.cake{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
}

.layer{
background:pink;
border-radius:12px;
margin:auto;
}

.layer1{width:200px;height:60px}
.layer2{width:150px;height:50px;margin-top:-10px}
.layer3{width:100px;height:40px;margin-top:-10px}

/* nến */

.candle{
width:10px;
height:35px;
background:white;
position:absolute;
top:-40px;
}

.candle:nth-child(4){left:25px}
.candle:nth-child(5){left:45px}
.candle:nth-child(6){left:65px}

.flame{
width:15px;
height:20px;
background:orange;
border-radius:50%;
position:absolute;
top:-18px;
box-shadow:0 0 15px orange;
animation:flicker .1s infinite;
}

@keyframes flicker{
50%{transform:scale(1.3)}
}

/* tim */

.heart{
position:absolute;
color:pink;
font-size:18px;
animation:rise 5s linear forwards;
}

@keyframes rise{
to{
transform:translateY(-600px);
opacity:0;
}
}

button{
margin-top:20px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎂 Happy Birthday Kim Hoa 🎂</h1>

<button onclick="startMic()">🎤 Thổi nến</button>

<div class="message">

<div class="line">Kim Hoa à ❤️</div>
<div class="line">Tuổi mới thật xinh đẹp ✨</div>
<div class="line">Tiền nhiều như lá 🍀</div>
<div class="line">Người yêu nhiều như sao ⭐</div>
<div class="line">Và sớm trở thành đại gia bao cả thế giới 🌍</div>

</div>

<div class="cake">

<div class="layer layer3"></div>
<div class="layer layer2"></div>
<div class="layer layer1"></div>

<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>

</div>

<audio id="music"
src="https://cdn.pixabay.com/audio/2022/10/30/audio_3c2e0c1f11.mp3">
</audio>

<script>

/* tạo sao */

for(let i=0;i<100;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)

}

/* tạo bong bóng */

for(let i=0;i<15;i++){

let b=document.createElement("div")

b.className="balloon"

let colors=["red","yellow","blue","pink","purple"]

b.style.background=colors[Math.floor(Math.random()*5)]

b.style.left=Math.random()*100+"vw"

document.body.appendChild(b)

}

/* micro */

let blown=false

async function startMic(){

try{

const stream = await navigator.mediaDevices.getUserMedia({audio:true})

const audioContext = new (window.AudioContext || window.webkitAudioContext)()

const source = audioContext.createMediaStreamSource(stream)

const analyser = audioContext.createAnalyser()

analyser.fftSize = 256

source.connect(analyser)

const data = new Uint8Array(analyser.frequencyBinCount)

function detect(){

analyser.getByteFrequencyData(data)

let volume = data.reduce((a,b)=>a+b)/data.length

if(volume > 35 && !blown){

blown=true

blow()

}

requestAnimationFrame(detect)

}

detect()

}catch{

alert("Hãy cho phép truy cập micro để thổi nến 🎤")

}

}

/* thổi nến */

function blow(){

document.querySelectorAll(".flame").forEach(f=>{
f.style.display="none"
})

document.getElementById("music").play()

showMessage()

hearts()

}

/* tim */

function hearts(){

setInterval(()=>{

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"
h.style.top="80vh"

document.body.appendChild(h)

},400)

}

/* hiện lời chúc */

function showMessage(){

let lines=document.querySelectorAll(".line")

lines.forEach((line,i)=>{

setTimeout(()=>{
line.classList.add("show")
},i*1500)

})

}

</script>

</body>
</html>
